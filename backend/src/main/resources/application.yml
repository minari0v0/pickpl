spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pickpl?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false   # OSIV 비활성화 (트랜잭션 밖 LAZY 로딩 방지)
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  swagger-ui:
    path: /swagger-ui.html   # localhost:8080/swagger-ui.html 로 접속 가능
  api-docs:
    path: /v3/api-docs

  data:
    redis:
      host: localhost
      port: 6379
